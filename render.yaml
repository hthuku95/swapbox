databases:
  - name: swapbox-db
    plan: free
    region: oregon
    databaseName: swapbox
    databaseUser: swapbox_user
    postgresMajorVersion: "16"

services:
  - type: web
    name: swapbox
    runtime: python
    plan: free
    region: oregon
    branch: master
    buildCommand: ./build.sh
    startCommand: gunicorn swapbox.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swapbox-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SWAPBOX_VOLTAGE_API_KEY
        sync: false
      - key: SWAPBOX_STAGING_WALLET_ID
        sync: false
      - key: VOLTAGE_ORGANIZATION_ID
        sync: false
      - key: VOLTAGE_STAGING_ENVIRONMENT_ID
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: VOLTAGE_WEBHOOK_SECRET
        sync: false
